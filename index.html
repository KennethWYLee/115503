<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <title>智慧顧問協作洞察工作台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body style="--accent:#0f766e;--accent2:#2563eb;--accent3:#f59e0b;--dark:#10201f">
    <main class="shell">
      <aside class="rail">
        <section class="brand">
          <span class="brand-mark">AI</span>
          <div>
            <strong>Advisor Insight</strong>
            <small>顧問文字回饋分析與報告協作</small>
          </div>
        </section>
        <nav class="nav" id="nav"></nav>
        <section class="operator">
          <span>操作身分</span>
          <strong>全權限展示</strong>
          <small>免登入，公開版使用模擬資料與完整操作流程。</small>
        </section>
      </aside>
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">115503 專業化展示版</p>
            <h1 id="viewTitle"></h1>
          </div>
          <div id="statusLine" class="status-line"></div>
        </header>
        <section id="app"></section>
      </section>
    </main>
    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
